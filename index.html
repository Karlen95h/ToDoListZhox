<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Դպրոցական Todo List</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="img/logo.png" class="logo" alt="Դպրոցի լոգո" />
      <div class="school-name">Գյումրու Տնտեսագիտական Վարժարան</div>
    </div>

    <h1>📚 Իմ հանձնարարությունները</h1>

    <div class="login-box">
      <h2>Մուտք</h2>
      <input type="text" id="student-name-input" placeholder="Աշակերտի անուն  ազգանուն" />
      <button id="login-btn">Մուտք գործել</button>
    </div>
  </div>

  <!-- JS ֆայլը login-ի համար -->
  <script src="login.js"></script>
</body>
</html>
