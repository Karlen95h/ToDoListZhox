<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="todo.css">
</head>

<body>

  <div class="container">

    <div class="header">
      <img src="img/logo.png" class="logo">
      <div class="school-name">Գյումրու Տնտեսագիտական Վարժարան</div>
      <div class="student-name">Բարև, <span id="student-name">Ուսանող</span>!</div>
    </div>

    <div class="add-task">

      <input type="text" id="task-input" placeholder="Գրեք հանձնարարությունը">

      <!-- Հոսքեր -->
      <select id="task-subject">
        <option value="">Ընտրեք հոսքը</option>
        <option value="economics">Տնտեսագիտական հոսք</option>
        <option value="humanities">Հումանիտար հոսք</option>
        <option value="science">Բնագիտական հոսք</option>
        <option value="ai">Արհեստական բանականություն</option>
        <option value="physmath">Ֆիզմաթ հոսք</option>
      </select>

      <!-- Առարկաներ -->
      <select id="task-course">
        <option value="">Ընտրեք առարկան</option>
      </select>

      <input type="datetime-local" id="task-deadline">

      <button id="add-btn">Ավելացնել</button>

    </div>

    <ul id="task-list"></ul>

  </div>

  <script src="script.js"></script>

</body>
</html>
